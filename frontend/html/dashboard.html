<div class="max-w-2xl mx-auto min-h-screen px-4 py-10">
    <div class="max-w-md mx-auto">
        <!-- Profile Card -->
        <div class="bg-gray-900 shadow-xl rounded-2xl p-8 mb-8" id="profileCard">
            <div class="text-center mb-8">
                <div id="profilePicture"
                    class="w-32 h-32 mx-auto mb-6 rounded-full bg-linear-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-3xl font-bold shadow-2xl">
                    <!-- Placeholder for ProfilePicture blob; replace with img src if available -->
                    PP
                </div>
                <h1 class="text-3xl font-bold text-gray-100" id="alias"></h1>
                <p class="text-gray-400 mt-2" id="email"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Games Won</label>
                    <div class="text-2xl font-bold text-blue-400" id="gamesWon"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Member Since</label>
                    <div class="text-lg text-gray-100" id="creationDate"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                    <span

                        id="online"></span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Account Type</label>
                    <span
                        class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-800"
                        id="accountType"></span>
                </div>
            </div>

            <div class="mt-8 pt-8 border-t border-gray-800">
                <button type="button" id="editProfileBtn"
                    class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-1 rounded transition">Edit

            </div>
        </div>
