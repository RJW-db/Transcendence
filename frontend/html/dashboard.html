<div class="max-w-2xl mx-auto min-h-screen px-4 py-10">
    <div class="max-w-md mx-auto">
        <!-- Profile Card -->
        <div class="bg-gray-900 shadow-xl rounded-2xl p-8 mb-8" id="profileCard"> 
            <div class="text-center mb-8">
                <div class="w-32 h-32 mx-auto mb-6 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center text-white text-3xl font-bold shadow-2xl">
                    <!-- Placeholder for ProfilePicture blob; replace with img src if available -->
                    PP
                </div>
                <h1 class="text-3xl font-bold text-gray-100" id="alias"></h1>
                <p class="text-gray-400 mt-2" id="email"></p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Games Won</label>
                    <div class="text-2xl font-bold text-blue-400" id="gamesWon"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Member Since</label>
                    <div class="text-lg text-gray-100" id="creationDate"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Status</label>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800" id="online"></span>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-300 mb-2">Account Type</label>
                    <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-blue-100 text-blue-800" id="accountType"></span>
                </div>
            </div>

            <div class="mt-8 pt-8 border-t border-gray-800">
                 <button type="button" id="editProfileBtn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-1 rounded transition">Edit Profile</button>
            </div>
        </div>

        <!-- Edit Form (hidden by default) -->
        <div id="editForm" class="bg-gray-900 shadow-xl rounded-2xl p-8 hidden">
            <h2 class="text-2xl font-bold text-gray-100 mb-6">Update Profile</h2>
            <form id="profileForm" class="space-y-6">
                <div>
                    <label for="editAlias" class="block text-sm font-medium text-gray-300 mb-2">Alias</label>
                    <input type="text" id="editAlias" name="alias" class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                </div>
                <div>
                    <label for="editEmail" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                    <input type="email" id="editEmail" name="email" class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500" required>
                </div>
                <!-- Password update section -->
                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gray-300 mb-2">New Password (leave blank to keep current)</label>
                    <input type="password" id="newPassword" name="password" class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <!-- Profile Picture Upload (for blob handling) -->
                <div>
                    <label for="profilePicture" class="block text-sm font-medium text-gray-300 mb-2">Profile Picture</label>
                    <input type="file" id="profilePicture" name="profilePicture" accept="image/*" class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div class="flex space-x-4 pt-4">
                    <button type="submit" class="flex-1 bg-gradient-to-r from-green-500 to-green-600 text-white py-3 px-6 rounded-xl font-semibold shadow-lg hover:shadow-xl transition-all duration-200">
                        Save Changes
                    </button>
                    <button type="button" onclick="toggleEdit()" class="flex-1 bg-gray-700 text-gray-100 py-3 px-6 rounded-xl font-semibold hover:bg-gray-600 transition-all duration-200">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>
    </div>
