<!-- Edit Form (hidden by default) -->
<div class="max-w-2xl mx-auto min-h-screen px-4 py-10">

    <div id="editForm" class="bg-gray-900 shadow-xl rounded-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-100 mb-6">Update Profile</h2>
        <form id="profileForm" class="space-y-6">
            <div>
                <label for="editAlias" class="block text-sm font-medium text-gray-300 mb-2">Alias</label>
                <input type="text" id="editAlias" name="alias"
                    class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div>
                <label for="editEmail" class="block text-sm font-medium text-gray-300 mb-2">Email</label>
                <input type="email" id="editEmail" name="email"
                    class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <!-- Password update section -->
            <div>
                <label for="newPassword" class="block text-sm font-medium text-gray-300 mb-2">New Password (leave blank
                    to
                    keep current)</label>
                <input type="password" id="newPassword" name="password"
                    class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <!-- Profile Picture Upload (for blob handling) -->
            <div>
                <label for="profilePictureUpload" class="block text-sm font-medium text-gray-300 mb-2">Profile Picture</label>
                <input type="file" id="profilePictureUpload" name="profilePictureUpload" accept="image/png"
                    class="w-full px-4 py-3 border border-gray-700 bg-gray-950 text-gray-100 rounded-xl shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>
            <div class="flex space-x-4 pt-4">
                <button type="submit"
                    class="flex-1 bg-linear-to-r from-green-500 to-green-600 text-white py-3 px-6 rounded-xl font-semibold shadow-lg hover:shadow-xl transition-all duration-200">
                    Save Changes
                </button>
                <button type="cancel" id="cancelEditBtn"
                    class="flex-1 bg-gray-700 text-gray-100 py-3 px-6 rounded-xl font-semibold hover:bg-gray-600 transition-all duration-200">
                    Cancel
                </button>
            </div>
        </form>
        <div id="errorBox" class="mt-4 text-sm text-red-500 hidden"></div>
    </div>
</div>
